<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite Nicolly</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  overflow: hidden;
}

/* TELAS */
.screen {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  background-color: #fce4ec;

}

.active {
  display: block;
}

/* BOTÕES (base) */
button {
  position: absolute;
  border: none;
  cursor: pointer;
  background: transparent;
}

/* ===== TELA 1 ===== */
#screen1 {
  background-image: url('imagemfundo01.jpeg');
}

/* botão abrir */
.btn-open {
  width: 250px;
  height: 70px;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
}

/* ===== TELA 2 ===== */
#screen2 {
  background-image: url('imagemfundo02.jpeg');
}

/* Confirmar presença */
.btn-whatsapp {
  width: 90px;
  height: 90px;
  bottom: 200px;
  left: 42%;
  margin-bottom: 3%;
  
}

/* Local */
.btn-maps {
  width: 90px;
  height: 90px;
  bottom: 200px;
  left: 48%;
  margin-bottom: 3%;
}

/* Presentes */
.btn-gifts {
  width: 90px;
  height: 90px;
  bottom: 200px;
  left: 53%;
  margin-bottom: 3%;
  
}

/* ===== TELA 3 ===== */
#screen3 {
  background-image: url('imagemfundo03.jpeg');
}

/* botão voltar */
.btn-back {
  width: 200px;
  height: 60px;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<!-- 🔹 TELA 1 -->
<div id="screen1" class="screen active">
  <button class="btn-open" onclick="goTo(2)"></button>
</div>

<!-- 🔹 TELA 2 -->
<div id="screen2" class="screen">

  <button class="btn-whatsapp"
    onclick="window.open('https://wa.me/559999999999')">
  </button>

  <button class="btn-maps"
    onclick="window.open('https://maps.google.com')">
  </button>

  <button class="btn-gifts"
    onclick="goTo(3)">
  </button>

</div>

<!-- 🔹 TELA 3 -->
<div id="screen3" class="screen">
  <button class="btn-back" onclick="goTo(1)"></button>
</div>

<script>
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(el => {
    el.classList.remove('active');
  });

  document.getElementById('screen' + screen).classList.add('active');
}
</script>

</body>
</html>
