
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Nicolly</title>
 
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
 
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #fce4ec;
}
 
/* ── Wrapper que mantém a proporção da imagem de fundo ── */
/*
  Ajuste --img-ratio para a proporção real das suas imagens.
  Exemplos:
    9/16  → celular vertical  (padrão aqui)
    3/4   → retrato clássico
    1/1   → quadrado
    16/9  → paisagem
*/
:root {
  --img-ratio: 9 / 16;
}
 
.stage {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
 
.screen-wrapper {
  position: relative;
  /* ocupa o máximo possível mantendo a proporção */
  aspect-ratio: var(--img-ratio);
  width: min(100%, calc(100vh * 9 / 16));
  height: auto;
  max-height: 100%;
}
 
/* TELAS */
.screen {
  display: none;
  position: absolute;
  inset: 0;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  border-radius: 4px;
  overflow: hidden;
}
 
.active {
  display: block;
}
 
/* Botões — posicionados em % do wrapper, sem px fixo */
button {
  position: absolute;
  border: none;
  cursor: pointer;
  background: transparent;
  /* área de toque mínima para mobile */
  min-width: 44px;
  min-height: 44px;
}
 
/* ===== TELA 1 ===== */
#screen1 {
  background-image: url('imagemfundo01.jpeg');
}
 
.btn-open {
  /* centralizado horizontalmente, perto do rodapé */
  left: 50%;
  transform: translateX(-50%);
  bottom: -2%;
  width: 55%;
  height: 8%;
  
}
 
/* ===== TELA 2 ===== */
#screen2 {
  background-image: url('imagemfundo02.jpeg');
}
 
/* Os três botões ficam lado a lado na mesma altura.
   Ajuste bottom/left/width conforme a sua arte. */
.btn-whatsapp,
.btn-maps,
.btn-gifts {
  bottom: 25%;
  height: 9%;
  width: 13%;
}
 
.btn-whatsapp { left: 18%; }
.btn-maps     { left: 44%; }
.btn-gifts    { left: 69%; }
 
/* ===== TELA 3 ===== */
#screen3 {
  background-image: url('imagemfundo03.jpeg');
}
 
.btn-back {
  left: 4%;
  top: 4%;
  width: 11%;
  height: 6%;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4em;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: background 0.2s, transform 0.15s;
  min-width: 44px;
  min-height: 44px;
}
 
/* ── Debug: borda vermelha nos botões para calibração ──
   Descomente para ver exatamente onde cada botão está.
   
button { outline: 2px solid red !important; }
*/
</style>
</head>
 
<body>
 
<div class="stage">
  <div class="screen-wrapper">
 
    <!-- TELA 1 -->
    <div id="screen1" class="screen active">
      <button class="btn-open" onclick="goTo(2)" aria-label="Abrir convite"></button>
    </div>
 
    <!-- TELA 2 -->
    <div id="screen2" class="screen">
      <button class="btn-whatsapp"
        onclick="window.open('https://wa.me/+559492094696')"
        aria-label="Confirmar presença pelo WhatsApp">
      </button>
 
      <button class="btn-maps"
        onclick="window.open('https://www.google.com/maps/place/Espa%C3%A7o+Garden+Festas+e+Eventos/@-8.0393514,-50.0263041,17z/data=!3m1!4b1!4m6!3m5!1s0x92e0070cd86660dd:0x5718e19a38b3e282!8m2!3d-8.0393514!4d-50.0263041!16s%2Fg%2F11l6r_8sq6?entry=ttu&g_ep=EgoyMDI2MDQyNi4wIKXMDSoASAFQAw%3D%3D')"
        aria-label="Ver local no mapa">
      </button>
 
      <button class="btn-gifts"
        onclick="goTo(3)"
        aria-label="Ver lista de presentes">
      </button>
    </div>
 
    <!-- TELA 3 -->
    <div id="screen3" class="screen">
      <button class="btn-back" onclick="goTo(2)" aria-label="Voltar">&#8592;</button>
    </div>
 
  </div>
</div>
 
<script>
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen' + screen).classList.add('active');
}
</script>
 
</body>
</html>
